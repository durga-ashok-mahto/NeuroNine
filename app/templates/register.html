<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — NeuroNine</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body class="register-body">
    <!-- Particle Canvas Background -->
    <canvas id="particle-canvas" class="particle-canvas"></canvas>

    <!-- Success Toast Notification -->
    <div id="toast-success" class="toast-notification">
        <span class="toast-icon">✓</span>
        <span id="toast-text">Account created successfully! Welcome to NeuroNine.</span>
    </div>

    <!-- Glassmorphic Bento-Inspired Container -->
    <div class="register-card" id="register-card">
        <!-- Neural network logo representation (numeral 9 style) -->
        <div class="logo-wrapper">
            <svg class="neuro-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#5B7CFA" />
                        <stop offset="100%" stop-color="#90CAF9" />
                    </linearGradient>
                    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="5" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>
                <!-- Outer paths representing connections -->
                <path d="M 100 45 A 30 30 0 1 1 99.9 45 Z" fill="none" stroke="url(#logo-grad)" stroke-width="5" stroke-linecap="round" filter="url(#glow-filter)" />
                <path d="M 130 75 Q 130 145 90 155" fill="none" stroke="url(#logo-grad)" stroke-width="5" stroke-linecap="round" filter="url(#glow-filter)" />
                <!-- Core neural junction points -->
                <circle cx="100" cy="50" r="5" fill="#90CAF9" />
                <circle cx="130" cy="75" r="5.5" fill="#5B7CFA" />
                <circle cx="90" cy="155" r="6" fill="#90CAF9" />
                <circle cx="100" cy="75" r="7" fill="#5B7CFA" />
            </svg>
        </div>

        <!-- Typography -->
        <h1 class="brand-title">Neuro<span class="brand-accent">Nine</span></h1>
        <p class="brand-tagline">Think. Predict. Recognize.</p>

        <!-- Form -->
        <form class="register-form" id="register-form" novalidate>
            <!-- Full Name -->
            <div class="form-group">
                <label for="name-input" class="form-label">Full Name</label>
                <div class="input-container">
                    <input type="text" id="name-input" class="form-input" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="invalid-feedback" id="name-error">Full Name must be at least 2 characters.</div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email-input" class="form-label">Email Address</label>
                <div class="input-container">
                    <input type="email" id="email-input" class="form-input" placeholder="name@domain.com" required autocomplete="username">
                </div>
                <div class="invalid-feedback" id="email-error">Please enter a valid email address.</div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password-input" class="form-label">Password</label>
                <div class="input-container">
                    <input type="password" id="password-input" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                    <button type="button" class="password-toggle-btn" id="password-toggle" aria-label="Toggle password visibility">
                        <!-- Eye icon SVG -->
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <!-- Dynamic Strength Meter -->
                <div class="strength-meter-container">
                    <div class="strength-bar-track">
                        <div class="strength-bar-fill" id="strength-fill"></div>
                    </div>
                    <span class="strength-label" id="strength-label">Strength: None</span>
                </div>
                <div class="invalid-feedback" id="password-error">Password must be at least 6 characters.</div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirm-input" class="form-label">Confirm Password</label>
                <div class="input-container">
                    <input type="password" id="confirm-input" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                    <button type="button" class="password-toggle-btn" id="confirm-toggle" aria-label="Toggle confirm password visibility">
                        <!-- Eye icon SVG -->
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="invalid-feedback" id="confirm-error">Passwords do not match.</div>
            </div>

            <!-- Create Account button -->
            <div class="action-group">
                <button type="submit" class="btn-register" id="btn-submit" disabled>
                    <span class="spinner" id="btn-spinner"></span>
                    <span id="btn-text">Create Account</span>
                </button>
            </div>
        </form>

        <!-- Redirection footer links -->
        <p class="login-footer">
            Already have an account? <a href="{{ url_for('main.login') }}" class="login-link">Log In</a>
        </p>
    </div>

    <!-- Client Script -->
    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
