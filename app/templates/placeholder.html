{% extends 'base.html' %}

{% block title %}{{ title }} — NeuroNine{% endblock %}

{% block content %}
<div class="container page-container" style="display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 2rem;">
    <div class="skeleton-component-box" style="max-width: 550px; width: 100%; margin: 0 auto; padding: 3rem 2.5rem; border: 1px solid rgba(144, 202, 249, 0.15); background: rgba(18, 18, 30, 0.6); backdrop-filter: blur(16px); border-radius: 16px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4);">
        <div style="width: 70px; height: 70px; background: rgba(91, 124, 250, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#5B7CFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        </div>
        <h2 style="font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; margin-bottom: 0.8rem; color: var(--text-main, #ffffff);">{{ title }}</h2>
        <p style="color: var(--text-sub, #7895B2); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">{{ description }}</p>
        
        <div style="height: 120px; background: rgba(10, 10, 15, 0.3); border: 1px dashed rgba(144, 202, 249, 0.2); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub, #7895B2); font-size: 0.85rem; margin-bottom: 2rem;">
            <span style="font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #5B7CFA; margin-bottom: 0.4rem;">Feature Pipeline Incomplete</span>
            <span>Machine Learning & UI binding scheduled for next development sprint.</span>
        </div>

        <a href="{{ url_for('main.dashboard') }}" class="btn-dashboard-back" style="width: 100%; height: 42px; border: none; border-radius: 8px; font-size: 0.92rem; font-weight: 700; background: #5B7CFA; color: #F5F7FA; text-decoration: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(91, 124, 250, 0.3); transition: all 0.3s ease;">Return to Dashboard</a>
    </div>
</div>

<style>
    .btn-dashboard-back:hover {
        background: #4a6ceb !important;
        transform: translateY(-1.5px);
        box-shadow: 0 6px 18px rgba(91, 124, 250, 0.4) !important;
    }
</style>
{% endblock %}
